<svg width="720" height="440" viewBox="0 0 720 440" xmlns="http://www.w3.org/2000/svg"
     font-family="'DM Sans', Helvetica, sans-serif">

  <rect width="720" height="440" fill="#080808"/>

  <!-- ── Touch table surface (perspective trapezoid) ── -->
  <polygon points="80,300 640,300 580,200 140,200"
           fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- table legs suggestion -->
  <line x1="80"  y1="300" x2="80"  y2="340" stroke="#222" stroke-width="1.5"/>
  <line x1="640" y1="300" x2="640" y2="340" stroke="#222" stroke-width="1.5"/>
  <line x1="140" y1="200" x2="140" y2="240" stroke="#222" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="580" y1="200" x2="580" y2="240" stroke="#222" stroke-width="0.8" stroke-dasharray="3,3"/>
  <!-- surface grid suggestion -->
  <line x1="160" y1="213" x2="107" y2="293" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="240" y1="207" x2="168" y2="297" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="360" y1="200" x2="280" y2="300" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="480" y1="200" x2="440" y2="300" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="540" y1="203" x2="530" y2="299" stroke="#1a1a1a" stroke-width="1"/>

  <!-- ── Token (circle on table) ── -->
  <!-- shadow on table -->
  <ellipse cx="360" cy="256" rx="62" ry="14" fill="none" stroke="#222" stroke-width="1"/>
  <!-- token body -->
  <circle cx="360" cy="230" r="62" fill="#0f0f0f" stroke="#8850ff" stroke-width="2"/>
  <!-- token inner ring -->
  <circle cx="360" cy="230" r="54" fill="none" stroke="#1e1e2e" stroke-width="1"/>

  <!-- ── 4 chip slots inside token ── -->
  <!-- SS1 top-left -->
  <rect x="322" y="196" width="22" height="16" rx="2" fill="none" stroke="#00FFCD" stroke-width="1.5"/>
  <text x="333" y="208" font-size="7" fill="#00FFCD" text-anchor="middle">SS1</text>

  <!-- SS2 top-right -->
  <rect x="356" y="196" width="22" height="16" rx="2" fill="none" stroke="#00FFCD" stroke-width="1.5"/>
  <text x="367" y="208" font-size="7" fill="#00FFCD" text-anchor="middle">SS2</text>

  <!-- SS3 bottom-left -->
  <rect x="322" y="220" width="22" height="16" rx="2" fill="none" stroke="#00FFCD" stroke-width="1.5"/>
  <text x="333" y="232" font-size="7" fill="#00FFCD" text-anchor="middle">SS3</text>

  <!-- SS4 bottom-right -->
  <rect x="356" y="220" width="22" height="16" rx="2" fill="none" stroke="#00FFCD" stroke-width="1.5"/>
  <text x="367" y="232" font-size="7" fill="#00FFCD" text-anchor="middle">SS4</text>

  <!-- chip inserted indicator on SS1 (filled) -->
  <rect x="323" y="197" width="20" height="14" rx="1.5" fill="#00FFCD" fill-opacity="0.15" stroke="#00FFCD" stroke-width="1.5"/>

  <!-- token label -->
  <text x="360" y="256" font-size="8" fill="#555" text-anchor="middle" letter-spacing="2">TOKEN</text>

  <!-- ── Zigbee signal arcs ── -->
  <path d="M 405 195 Q 440 165 420 130" fill="none" stroke="#8850ff" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
  <path d="M 415 188 Q 460 148 435 105" fill="none" stroke="#8850ff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M 423 180 Q 480 132 450  80" fill="none" stroke="#8850ff" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- ── Receiver box ── -->
  <rect x="520" y="60" width="110" height="70" rx="4" fill="#0f1117" stroke="#8850ff" stroke-width="1.5"/>
  <!-- screen lines -->
  <line x1="534" y1="78"  x2="616" y2="78"  stroke="#333" stroke-width="1"/>
  <line x1="534" y1="88"  x2="600" y2="88"  stroke="#333" stroke-width="1"/>
  <line x1="534" y1="98"  x2="610" y2="98"  stroke="#333" stroke-width="1"/>
  <line x1="534" y1="108" x2="590" y2="108" stroke="#333" stroke-width="1"/>
  <!-- live dot -->
  <circle cx="614" cy="74" r="4" fill="#22c55e"/>
  <!-- USB plug suggestion -->
  <rect x="566" y="130" width="18" height="8" rx="1" fill="none" stroke="#444" stroke-width="1"/>
  <line x1="575" y1="138" x2="575" y2="148" stroke="#444" stroke-width="1"/>

  <!-- ── 4 feature lines from receiver ── -->
  <line x1="630" y1="75"  x2="700" y2="60"  stroke="#00FFCD" stroke-width="1" stroke-dasharray="4,3" opacity="0.8"/>
  <line x1="630" y1="85"  x2="700" y2="80"  stroke="#00FFCD" stroke-width="1" stroke-dasharray="4,3" opacity="0.8"/>
  <line x1="630" y1="95"  x2="700" y2="100" stroke="#00FFCD" stroke-width="1" stroke-dasharray="4,3" opacity="0.8"/>
  <line x1="630" y1="108" x2="700" y2="120" stroke="#00FFCD" stroke-width="1" stroke-dasharray="4,3" opacity="0.8"/>

  <!-- feature labels -->
  <text x="705" y="63"  font-size="9" fill="#00FFCD">channel 1</text>
  <text x="705" y="83"  font-size="9" fill="#00FFCD">channel 2</text>
  <text x="705" y="103" font-size="9" fill="#00FFCD">channel 3</text>
  <text x="705" y="123" font-size="9" fill="#00FFCD">channel 4</text>

  <!-- ── Labels ── -->
  <text x="360" y="380" font-size="11" fill="#555" text-anchor="middle" letter-spacing="3">TOUCH SURFACE</text>

  <text x="360" y="155" font-size="10" fill="#8850ff" text-anchor="middle" letter-spacing="2">ZIGBEE</text>

  <text x="575" y="55" font-size="10" fill="#666" text-anchor="middle" letter-spacing="2">RECEIVER</text>

  <!-- token ID callout -->
  <line x1="298" y1="218" x2="210" y2="185" stroke="#333" stroke-width="1"/>
  <text x="200" y="180" font-size="9" fill="#555" text-anchor="middle">unique ID</text>
  <text x="200" y="192" font-size="9" fill="#555" text-anchor="middle">from MAC</text>

</svg>
